<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link rel="stylesheet" href="./chatapp.css">
    

    <title>ChatApp</title>
</head>

<!-- チャットアプリの画面 -->
<body onload="page_onload();">

    <div id="main_screen_container" class="main_screen_container">
        <div class="app_header">
        <h1 class="app_title">Minimal-wschat</h1>
        <span id="label_isconnected">[Connection Indicator]</span>
        <span>, </span>
        <span id="label_session_id"></span>
        </div>
        <div class="app_main">
            <button id="kickoff_chat_button" type="button" onclick="kickoff_chat()">新規対話</button>
            <div class="chatlog_area", id="chatlog_area">
                <div class="speechbox_base speechbox_tx">
                    <p class="message_base message_tx">
                        こんにちは
                    </p>
                </div>

                <div class="speechbox_base speechbox_rx">
                    <p class="message_base message_rx">こんにちは</p>
                </div>
                <div class="speechbox_base speechbox_rx speechbox_processing" id="message_box_processing">
                    <p class="message_base message_rx message_processing">...</p>
                </div>


            </div>

            <div class="app_input_area">
                <div class="chat-input">
                    <textarea id="message_input" class="message_input" name="message" placeholder="メッセージを入力" maxlength="512"></textarea>
                    <button id="sendButton" class="button-send btn-primary" type="button" onclick="send_message()">送信<br><u>(Ctrl+Enter)</u></button>
                </div>
            </div>
        </div>
    </div>
    <div class="app_footer">
        <details>
            <summary>詳細設定</summary>
            <label for="backend_address">バックエンドサーバ</label>
            <input type="text" id="backend_address" value="localhost:8080" style="width:300px;">
            <br>
            <input type="text" id="restore_session_id_input" placeholder="復元するセッションIDを入力">
            <button id="restore_chat_button" type="button" onclick="restore_session_manual()">対話を復元</button>
        </details>  
    </div>


    <div class="debugger_footer">
        <select id="speech_user">
            <option value="tx">送信者</option>
            <option value="rx">受信者</option>

        </select>
        <button id="addMessageBtn" class="btn btn-secondary" type="button">メッセージ追加</button>
        <button id="clearMessagesBtn" class="btn btn-secondary" type="button" onclick="clear_messageboxes()">クリア</button>
        <button id="createWsSessionBtn" class="btn btn-secondary" type="button" onclick="create_ws_session()">WSセッション作成</button>
    </div>

    <script src="./chatapp.js"></script>
</body>
</html>
